<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="oilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#161b22" />
  <!-- Can Body -->
  <rect x="25" y="30" width="50" height="50" rx="4" fill="url(#oilGrad)" />
  <!-- Neck and Cap -->
  <rect x="42" y="20" width="16" height="10" fill="#f8fafc" />
  <rect x="40" y="16" width="20" height="5" fill="#e2e8f0" />
  <!-- Handle -->
  <path d="M 75 35 Q 85 45 75 55" fill="none" stroke="#0ea5e9" stroke-width="6" stroke-linecap="round" />
  <!-- Oil Drop Logo -->
  <path d="M 50 45 C 50 45, 62 62, 50 68 C 38 62, 50 45, 50 45 Z" fill="url(#dropGrad)" />
</svg>
